<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0D7390"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="ConfereOps"/>
<title>ConfereOps</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#E8EDF2;font-family:'Roboto',sans-serif;display:flex;justify-content:center;min-height:100vh}
#root{width:100%;max-width:430px;min-height:100vh;background:#F0F3F8;display:flex;flex-direction:column}
.screen{flex:1;display:flex;flex-direction:column;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.shake{animation:shake .45s ease}
@keyframes pop{0%{opacity:0;transform:translateY(-6px)}100%{opacity:1;transform:translateY(0)}}
.pop{animation:pop .25s ease}
@keyframes slideUp{0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes flamePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
@keyframes barFill{from{width:0}}

/* ── TOP BAR ──────────────────────────────────── */
.top-bar{background:#0D7390;padding:0 16px;flex-shrink:0}
.top-bar-main{height:48px;display:flex;align-items:center;gap:10px}
.top-bar-icon{width:30px;height:30px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.top-bar-title{color:#fff;font-size:15px;font-weight:700;letter-spacing:.02em;flex:1}
.top-bar-sub{background:rgba(255,255,255,.12);padding:8px 16px;display:flex;align-items:center;gap:10px;border-top:1px solid rgba(255,255,255,.08)}
.top-bar-user{color:rgba(255,255,255,.9);font-size:12px;font-weight:600;flex:1}
.top-bar-level{background:rgba(255,255,255,.18);color:#FFD54F;font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px}

/* ── SECTOR HEADER ──────────────────────────────── */
.sec{padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sec span{color:#607080;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}

/* ── CHECKLIST CARD ──────────────────────────────── */
.cl-card{background:#fff;border-radius:14px;margin:0 12px 10px;border:none;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:stretch;width:calc(100% - 24px);cursor:pointer;text-align:left;transition:all .15s;padding:0;font-family:'Roboto',sans-serif}
.cl-card:active{transform:scale(.98);box-shadow:none}
.cl-card-icon{width:52px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:#F7F9FC}
.cl-card-body{flex:1;padding:12px 12px 12px 0;min-width:0}
.cl-card-name{font-size:14px;font-weight:700;color:#1A1A1A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.cl-card-time{font-size:11px;color:#888;margin-bottom:6px}
.cl-card-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.04em}

/* ── PROGRESS BAR ──────────────────────────────── */
.prog-track{height:5px;background:rgba(255,255,255,.25);overflow:hidden;flex-shrink:0}
.prog-fill{height:100%;background:#FFD54F;transition:width .4s ease}

/* ── EXEC STEP BAR ──────────────────────────────── */
.step-bar{background:#0D7390;padding:10px 16px 14px;flex-shrink:0}
.step-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.step-bar-num{color:rgba(255,255,255,.7);font-size:11px;font-weight:700;letter-spacing:.05em}
.step-bar-pct{color:#FFD54F;font-size:13px;font-weight:700}
.step-bar-name{color:#fff;font-size:13px;font-weight:700;background:rgba(255,255,255,.15);padding:6px 12px;border-radius:8px;margin-top:8px}
.step-prog{height:5px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;margin-top:2px}
.step-prog-fill{height:100%;background:#FFD54F;border-radius:99px;transition:width .4s}

/* ── ITEM CARD ──────────────────────────────── */
.item-card{background:#fff;border-radius:14px;margin:10px 12px 0;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.item-card-label{font-size:14px;color:#1A1A1A;font-weight:500;margin-bottom:12px;line-height:1.4}
.check-btns{display:flex;gap:10px}
.check-btn{flex:1;border:2px solid #E0E0E0;background:#FAFAFA;border-radius:10px;padding:16px;font-size:28px;cursor:pointer;transition:all .15s;text-align:center}
.check-btn.sel-no{background:#FFEBEE;border-color:#C62828}
.check-btn.sel-yes{background:#E8F5E9;border-color:#2E7D32}

/* ── PROFILE ──────────────────────────────────── */
.profile-header{background:linear-gradient(160deg,#0D7390 0%,#1A237E 100%);padding:24px 16px 20px;text-align:center;flex-shrink:0}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px}
.profile-name{color:#fff;font-size:17px;font-weight:700;margin-bottom:3px}
.profile-role{color:rgba(255,255,255,.7);font-size:12px;margin-bottom:14px}
.profile-stats{display:flex;justify-content:center;gap:24px}
.stat-item{text-align:center}
.stat-val{color:#FFD54F;font-size:20px;font-weight:700}
.stat-lbl{color:rgba(255,255,255,.6);font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-top:2px}

/* ── PROFILE CARDS ──────────────────────────────── */
.pcard{background:#fff;border-radius:14px;margin:10px 12px 0;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.pcard-title{font-size:11px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
.streak-num{font-size:44px;font-weight:900;color:#1A1A1A;line-height:1;display:inline-block;animation:countUp .4s ease}
.flame{display:inline-block;animation:flamePulse 1.4s ease-in-out infinite;font-size:32px;vertical-align:middle;margin-left:6px}
.bar-wrap{height:6px;background:#EBEBEB;overflow:hidden;border-radius:99px;margin-top:6px}
.bar-fill{height:100%;border-radius:99px;animation:barFill 1s ease both}
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.badge-item{background:#F7F9FC;border:1px solid #E8EDF2;border-radius:12px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center}
.badge-item.locked{opacity:.3}
.badge-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.rank-toggle{display:flex;background:#F0F3F8;border-radius:10px;overflow:hidden;margin-bottom:12px;padding:3px;gap:3px}
.rtab{flex:1;background:transparent;border:none;font-size:11px;font-weight:700;padding:7px;cursor:pointer;font-family:'Roboto',sans-serif;text-transform:uppercase;letter-spacing:.04em;color:#888;border-radius:8px;transition:all .15s}
.rtab.active{background:#fff;color:#1A237E;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.lv-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px}

/* ── BOTTOM NAV ──────────────────────────────────── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;display:flex;border-top:1px solid #E8EDF2;z-index:50;padding:6px 0 10px;box-shadow:0 -2px 10px rgba(0,0,0,.08)}
.bnav-tab{flex:1;background:transparent;border:none;color:#AAB;font-size:10px;font-weight:700;padding:4px 6px;cursor:pointer;font-family:'Roboto',sans-serif;text-transform:uppercase;letter-spacing:.05em;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s}
.bnav-tab.active{color:#0D7390}
.bnav-icon{font-size:22px;line-height:1}
.pb{padding-bottom:72px}

/* ── MISC ──────────────────────────────────────── */
.btn{border:none;cursor:pointer;font-family:'Roboto',sans-serif;font-weight:700;transition:all .12s;outline:none;text-transform:uppercase;letter-spacing:.04em}
.btn:active{filter:brightness(.9)}
.btn-blue{background:#1565C0;color:#fff;padding:14px;font-size:13px;flex:1}
.btn-green{background:#2E7D32;color:#fff;padding:14px;font-size:13px;flex:1}
.btn-teal{background:#0D7390;color:#fff;padding:14px;font-size:14px;font-weight:700;border-radius:12px;width:100%}
.btn-gray{background:#9E9E9E;color:#fff;padding:14px;font-size:13px;flex:1}
.btn-row{display:flex;gap:2px;flex-shrink:0}
.inp{background:#fff;border:2px solid #B0B0B0;color:#1A1A1A;font-family:'Roboto',sans-serif;font-size:13px;outline:none;width:100%;padding:10px 12px;transition:border .15s;border-radius:10px}
.inp:focus{border-color:#0D7390}
textarea.inp{resize:none;line-height:1.5}
input[type=number].inp{font-size:26px;font-weight:700;text-align:center}
input[type=number].inp::-webkit-inner-spin-button{-webkit-appearance:none}
.search-inp{background:#fff;border:1.5px solid #D0D0D0;color:#1A1A1A;font-family:'Roboto',sans-serif;font-size:14px;outline:none;width:100%;padding:10px 14px 10px 38px;transition:border .15s;border-radius:10px}
.search-inp:focus{border-color:#0D7390}
.search-wrap{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#999;font-size:16px;pointer-events:none}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:#fff;width:100%;max-width:430px;animation:slideUp .25s ease;border-radius:20px 20px 0 0}
.modal-hdr{background:#0D7390;padding:14px 16px;border-radius:20px 20px 0 0}
.modal-hdr span{color:#fff;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.spinner{width:36px;height:36px;border:4px solid #DDD;border-top-color:#0D7390;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.err-bar{background:#FFEBEE;border-radius:10px;margin:8px 12px;padding:10px 14px;font-size:12px;color:#C62828;font-weight:700}
.pin-box{width:60px;height:72px;border:2px solid #D0D0D0;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;border-radius:12px;transition:all .15s}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createClient}=supabase;
const sb=createClient('https://fmuolonucniwaosseijh.supabase.co','sb_publishable_Ib7zu9sSJmpCIi3Q8j2E2w_6FCR2VVE');
const C={teal:"#0D7390",navy:"#1A237E",blue:"#1565C0",green:"#2E7D32",amber:"#F9A825",red:"#C62828",bg:"#F2F2F2",white:"#fff",bd:"#D0D0D0",tx:"#1A1A1A",t2:"#444",t3:"#777",t4:"#AEAEB2"};
const ST_CFG={urgente:{label:"URGENTE",c:"#fff",bg:C.red},pendente:{label:"PENDENTE",c:"#1A1A1A",bg:C.amber},agendado:{label:"AGENDADO",c:"#fff",bg:"#546E7A"}};
const BADGE_DEFS=[
  {id:'seq7',name:'Pontual',desc:'7 dias seguidos',emoji:'⏰',color:'#B5D4F4',text:'#0C447C',check:d=>d.streak>=7},
  {id:'seq10',name:'Sequência 10',desc:'10 dias seguidos',emoji:'🔥',color:'#FAC775',text:'#633806',check:d=>d.streak>=10},
  {id:'perfeito',name:'Perfeito',desc:'100% numa semana',emoji:'⭐',color:'#C0DD97',text:'#27500A',check:d=>d.weekDone>=5},
  {id:'veterano',name:'Veterano',desc:'30 dias seguidos',emoji:'🛡️',color:'#CECBF6',text:'#3C3489',check:d=>d.streak>=30},
  {id:'inspetor',name:'Inspetor',desc:'50 checklists feitos',emoji:'👁️',color:'#F4C0D1',text:'#72243E',check:d=>d.totalDone>=50},
  {id:'mestre',name:'Mestre',desc:'3 meses impecável',emoji:'🏆',color:'#FAC775',text:'#633806',check:d=>d.streak>=90},
];
const LEVELS=[
  {min:0,level:1,name:'Iniciante',color:'#D3D1C7',text:'#444'},
  {min:200,level:2,name:'Aprendiz',color:'#C0DD97',text:'#27500A'},
  {min:800,level:3,name:'Confiável',color:'#85B7EB',text:'#0C447C'},
  {min:2000,level:4,name:'Especialista',color:'#CECBF6',text:'#3C3489'},
  {min:5000,level:5,name:'Líder',color:'#FAC775',text:'#633806'},
];
function getLevel(score){let lv=LEVELS[0];LEVELS.forEach(l=>{if(score>=l.min)lv=l;});return lv;}

let state={
  screen:'loading',operators:[],checklists:[],executions:[],
  employee:null,selEmp:null,
  activeTab:'checklists',
  profileData:null,profileLoading:false,profileRankTab:'week',
  activeList:null,executionId:null,
  stepIdx:0,sVals:{},sPhotos:{},sChecks:{},
  lastDone:null,activePhotoId:null,confirmRedo:null,error:null,
};
let fileInput=null,realtimeChannel=null;

function ss(p){state={...state,...p};render();}
function todayStart(){const d=new Date();d.setHours(0,0,0,0);return d.toISOString();}

async function init(){
  try{
    const {data:ops}=await sb.from('operators').select('*').eq('active',true).order('name');
    const {data:cls}=await sb.from('checklists').select('*,company_id, checklist_steps(id,name,position,step_items(id,type,label,position,unit))').eq('active',true).order('sector');
    cls.forEach(cl=>{cl.checklist_steps.sort((a,b)=>a.position-b.position);cl.checklist_steps.forEach(s=>s.step_items.sort((a,b)=>a.position-b.position));});
    const execs=await loadTodayExecs();
    subscribeRealtime();
    ss({screen:'login',operators:ops||[],checklists:cls||[],executions:execs,error:null});
  }catch(e){ss({screen:'login',error:'Erro ao conectar. Verifique a internet.'});}
}

async function loadTodayExecs(){
  const {data}=await sb.from('executions').select('*, operators(id,name)').gte('started_at',todayStart()).order('started_at',{ascending:false});
  return data||[];
}

function subscribeRealtime(){
  if(realtimeChannel)sb.removeChannel(realtimeChannel);
  realtimeChannel=sb.channel('exec-rt').on('postgres_changes',{event:'*',schema:'public',table:'executions'},async()=>{
    const execs=await loadTodayExecs();ss({executions:execs});
  }).subscribe();
}

async function loadProfileData(empId){
  ss({profileLoading:true,profileData:null});
  try{
    const {data:stats}=await sb.from('operator_stats').select('*').eq('operator_id',empId).single();
    const {data:execs}=await sb.from('executions').select('started_at').eq('operator_id',empId).eq('status','done').order('started_at',{ascending:false});
    const dates=[...new Set((execs||[]).map(e=>e.started_at.split('T')[0]))].sort((a,b)=>b.localeCompare(a));
    let streak=0;
    const today=new Date();today.setHours(0,0,0,0);
    let check=new Date(today);
    for(const dateStr of dates){
      const d=new Date(dateStr);d.setHours(0,0,0,0);
      const diff=Math.round((check-d)/(1000*60*60*24));
      if(diff<=1){streak++;check=d;}else break;
    }
    const weekDays=[];
    for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);weekDays.push(dates.includes(d.toISOString().split('T')[0]));}
    const {data:ranking}=await sb.from('operator_stats').select('operator_id,name,initials,week_score,month_score').order('week_score',{ascending:false});
    const weekStart=new Date();weekStart.setDate(weekStart.getDate()-weekStart.getDay());weekStart.setHours(0,0,0,0);
    const {data:weekExecs}=await sb.from('executions').select('started_at').eq('operator_id',empId).eq('status','done').gte('started_at',weekStart.toISOString());
    const weekDone=new Set((weekExecs||[]).map(e=>e.started_at.split('T')[0])).size;
    ss({profileLoading:false,profileData:{streak,weekDays,weekDone,weekScore:Number(stats?.week_score||0),monthScore:Number(stats?.month_score||0),totalDone:Number(stats?.total_done||0),totalScore:Number(stats?.total_score||0),ranking:ranking||[]}});
  }catch(e){ss({profileLoading:false});}
}

async function startList(cl){
  try{
    const existing=state.executions.find(e=>e.checklist_id===cl.id&&e.operator_id===state.employee.id&&e.status==='in_progress');
    let execId=existing?.id;
    if(!execId){
      const {data,error}=await sb.from('executions').insert({checklist_id:cl.id,operator_id:state.employee.id,status:'in_progress'}).select().single();
      if(error)throw error;execId=data.id;
    }
    ss({activeList:cl,executionId:execId,stepIdx:0,sVals:{},sPhotos:{},sChecks:{},screen:'exec'});
  }catch(e){ss({error:'Erro ao iniciar checklist.'});}
}

async function abandonList(){
  try{if(state.executionId)await sb.from('executions').update({status:'abandoned'}).eq('id',state.executionId);}catch(e){}
  ss({screen:'home',activeList:null,executionId:null,stepIdx:0,sVals:{},sPhotos:{},sChecks:{}});
}

function isProblemStep(step){return step.step_items.some(i=>i.label.includes('Detectou algo quebrado'));}
function problemChecked(step){const ci=step.step_items.find(i=>i.label.includes('Detectou'));return ci?state.sChecks[ci.id]:undefined;}

function canNext(){
  const step=state.activeList.checklist_steps[state.stepIdx];
  const isProb=isProblemStep(step);
  const probAns=isProb?problemChecked(step):undefined;
  return step.step_items.every(item=>{
    if(isProb){
      if(item.label.includes('Detectou'))return probAns!==undefined;
      if(item.label.includes('descreva')){return probAns===true?(state.sVals[item.id]||'').trim().length>0:true;}
      if(item.label.includes('opcional'))return true;
      return true;
    }
    if(item.type==='check')return state.sChecks[item.id]!==undefined;
    if(item.type==='photo'){const isOpt=item.label.toLowerCase().includes('opcional');return!!state.sPhotos[item.id]||isOpt;}
    if(item.type==='number')return((state.sVals[item.id]||'').split('|')[0]||'').trim().length>0;
    return true;
  });
}

async function nextStep(){
  const step=state.activeList.checklist_steps[state.stepIdx];
  try{
    const responses=step.step_items.map(item=>({
      execution_id:state.executionId,item_id:item.id,
      value:item.type==='check'?String(state.sChecks[item.id]):item.type==='photo'?null:(state.sVals[item.id]||''),
      photo_url:item.type==='photo'&&state.sPhotos[item.id]!=='skip'?(state.sPhotos[item.id]||null):null,
    }));
    await sb.from('item_responses').insert(responses);
    const problemCheck=step.step_items.find(i=>i.label.includes('Detectou'));
    const descItem=step.step_items.find(i=>i.label.includes('descreva'));
    const photoItem=step.step_items.find(i=>i.label.includes('opcional'));
    if(problemCheck&&state.sChecks[problemCheck.id]===true){
      const desc=descItem?state.sVals[descItem.id]||'':'';
      const photoUrl=photoItem&&state.sPhotos[photoItem.id]!=='skip'?state.sPhotos[photoItem.id]||null:null;
      if(desc||photoUrl){
        await sb.from('issues').insert({execution_id:state.executionId,checklist_id:state.activeList.id,operator_id:state.employee.id,description:desc||'Problema reportado',photo_url:photoUrl,status:'open'});
      }
    }
  }catch(e){ss({error:'Erro ao salvar.'});return;}
  const ni=state.stepIdx+1;
  if(ni>=state.activeList.checklist_steps.length){
    try{
      const pendingCount=Object.values(state.sChecks||{}).filter(v=>v===false).length;
      await sb.from('executions').update({status:'done',score:100,finished_at:new Date().toISOString(),pending_count:pendingCount}).eq('id',state.executionId);
      const execs=await loadTodayExecs();
      ss({lastDone:{name:state.activeList.name,icon:state.activeList.icon,score:100},screen:'home',activeList:null,executionId:null,stepIdx:0,sVals:{},sPhotos:{},sChecks:{},executions:execs});
    }catch(e){ss({error:'Erro ao finalizar.'});}
  }else{ss({stepIdx:ni,sVals:{},sPhotos:{},sChecks:{}});}
}

async function doRedo(motivo){
  const cl=state.confirmRedo;if(!cl)return;
  try{
    await sb.from('executions').update({status:'replaced',redo_reason:motivo||null}).eq('checklist_id',cl.id).eq('status','done').gte('started_at',todayStart());
    const execs=await loadTodayExecs();ss({confirmRedo:null,executions:execs});startList(cl);
  }catch(e){ss({error:'Erro.',confirmRedo:null});}
}

function triggerPhoto(id){state.activePhotoId=id;if(fileInput){fileInput.value='';fileInput.click();}}
async function handlePhoto(e){
  const f=e.target.files?.[0];if(!f)return;
  const id=state.activePhotoId;
  try{
    const path=`${state.executionId||'tmp'}/${id}_${Date.now()}.jpg`;
    const {error}=await sb.storage.from('photos').upload(path,f,{upsert:true});
    if(error)throw error;
    const {data:{publicUrl}}=sb.storage.from('photos').getPublicUrl(path);
    ss({sPhotos:{...state.sPhotos,[id]:publicUrl}});
  }catch(err){const r=new FileReader();r.onload=ev=>ss({sPhotos:{...state.sPhotos,[id]:ev.target.result}});r.readAsDataURL(f);}
}

function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on')&&typeof v==='function')el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;else if(k==='disabled')el.disabled=v;
    else if(k==='placeholder')el.placeholder=v;
    else if(k in el)el[k]=v;else el.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return el;
}

  const isProbStep=isProblemStep(step),probAns=isProbStep?problemChecked(step):undefined;
  if(!fileInput){fileInput=document.createElement('input');fileInput.type='file';fileInput.accept='image/*';fileInput.capture='environment';fileInput.style.display='none';fileInput.addEventListener('change',handlePhoto);document.body.appendChild(fileInput);}
  const scr=div({display:'flex',flexDirection:'column',flex:1});
  scr.appendChild(topBar('📋',activeList.name.toUpperCase()));
  if(error)scr.appendChild(h('div',{className:'err-bar'},error));
  const sub=div({background:C.navy,padding:'8px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0});
  const stepName=step.name&&step.name!=='Etapa'?step.name:'';
  sub.appendChild(div({},
    div({fontSize:11,color:'rgba(255,255,255,.6)',fontWeight:700,letterSpacing:'.06em'},'ETAPA '+(stepIdx+1)+' DE '+total),
    stepName?div({fontSize:15,color:'#fff',fontWeight:700,marginTop:2},stepName):div({fontSize:13,color:'rgba(255,255,255,.7)',marginTop:2},'Etapa '+(stepIdx+1))
  ));
  sub.appendChild(div({textAlign:'right'},div({fontSize:11,color:'rgba(255,255,255,.6)',fontWeight:700,letterSpacing:'.06em'},'PROGRESSO'),div({fontSize:14,color:'#FFD54F',fontWeight:700,marginTop:1},prog+'%')));
  scr.appendChild(sub);
  scr.appendChild(h('div',{className:'prog-track'},h('div',{className:'prog-fill',style:{width:prog+'%'}})));
  const isInvCl=state.activeList.checklist_type==='inventory';
  const body=div({flex:1,display:'flex',flexDirection:'column',overflowY:'auto'});

  // Search bar for inventory checklists
  let invSearchQuery='';
  if(isInvCl){
    const searchBar=h('div',{style:{padding:'10px 12px',background:'#fff',borderBottom:'1px solid #F0F0F0',flexShrink:0,display:'flex',alignItems:'center',gap:8}});
    const searchIcon=h('span',{style:{fontSize:16,color:'#999'}},'🔍');
    const searchInp=document.createElement('input');
    searchInp.type='text';searchInp.placeholder='Buscar item...';
    Object.assign(searchInp.style,{border:'none',outline:'none',flex:1,fontSize:14,fontFamily:"'Roboto',sans-serif",background:'transparent'});
    searchInp.addEventListener('input',e=>{
      invSearchQuery=e.target.value.toLowerCase();
      document.querySelectorAll('.inv-item-row').forEach(row=>{
        const name=(row.dataset.name||'').toLowerCase();
        row.style.display=invSearchQuery&&!name.includes(invSearchQuery)?'none':'';
      });
    });
    searchBar.appendChild(searchIcon);searchBar.appendChild(searchInp);
    body.appendChild(searchBar);
  }
  step.step_items.forEach((item,i)=>{
    const isProbText=isProbStep&&item.label.includes('descreva');
    const isProbPhoto=isProbStep&&item.label.includes('opcional');
    if((isProbText||isProbPhoto)&&probAns!==true)return;
    const isOptPhoto=item.label.toLowerCase().includes('opcional');
    const secBg=isProbStep?'#7B1010':C.navy;
    const cardBg=isProbStep?'#FFF8F8':C.white;
    const cardBd=isProbStep?'#FFCDD2':C.bd;
    const tL={check:isProbStep&&item.label.includes('Detectou')?'PROBLEMA ENCONTRADO?':'CONFIRMAÇÃO',photo:isOptPhoto?'FOTO (OPCIONAL)':'FOTO OBRIGATÓRIA',number:'LEITURA NUMÉRICA',text:isProbText?'DESCREVA O PROBLEMA':'OBSERVAÇÃO'}[item.type]||'ITEM';
    const tI={check:isProbStep?'🔧':'✓',photo:'📷',number:'🌡',text:isProbText?'⚠️':'📝'}[item.type];
    const box=h('div',{className:'inv-item-row',style:{background:cardBg,borderRadius:'14px',border:`1px solid ${cardBd}`,padding:'14px',marginBottom:10,marginTop:10}});
    box.dataset.name=item.label.toLowerCase();
    box.appendChild(div({fontSize:14,fontWeight:500,color:C.tx,marginBottom:12,lineHeight:1.5},item.label));
    if(item.type==='check'){
      const ck=sChecks[item.id];
      const btnRow=h('div',{className:'check-btns'});
      btnRow.appendChild(h('button',{className:'check-btn'+(ck===false?' sel-no':''),onClick:()=>ss({sChecks:{...sChecks,[item.id]:false}})},'❌'));
      btnRow.appendChild(h('button',{className:'check-btn'+(ck===true?' sel-yes':''),onClick:()=>ss({sChecks:{...sChecks,[item.id]:true}})},'✅'));
      box.appendChild(btnRow);
    }
    if(item.type==='photo'){
      const ph=sPhotos[item.id],ph2=multi?140:180;
      if(ph&&ph!=='skip'){const w=div({position:'relative',height:ph2+'px'});const img=document.createElement('img');img.src=ph;Object.assign(img.style,{width:'100%',height:'100%',objectFit:'cover',display:'block'});w.appendChild(img);w.appendChild(h('button',{className:'btn',onClick:()=>ss({sPhotos:{...sPhotos,[item.id]:null}}),style:{position:'absolute',top:8,right:8,background:'rgba(0,0,0,.65)',border:'none',color:'#fff',width:30,height:30,cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}},'✕'));box.appendChild(w);}
      else{
        box.appendChild(h('button',{className:'btn',onClick:()=>triggerPhoto(item.id),style:{height:ph2+'px',background:'#F5F5F5',border:`2px dashed ${C.bd}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:8,cursor:'pointer',width:'100%'}},div({fontSize:multi?32:40},'📷'),div({fontSize:13,fontWeight:700,color:C.blue,letterSpacing:'.04em'},isOptPhoto?'TIRAR FOTO (OPCIONAL)':'TIRAR FOTO'),div({fontSize:12,color:C.t3},'Toque para abrir a câmera')));
        if(isOptPhoto){box.appendChild(div({textAlign:'center',marginTop:8},h('button',{className:'btn',onClick:()=>ss({sPhotos:{...sPhotos,[item.id]:'skip'}}),style:{background:'transparent',border:'none',color:C.t3,fontSize:12,cursor:'pointer',fontFamily:"'Roboto',sans-serif",textDecoration:'underline'}},'Pular — sem foto')));}
      }
    }
    if(item.type==='number'){
        const isInvItem=state.activeList.checklist_type==='inventory';
        const numRow=h('div',{style:{display:'flex',alignItems:'center',gap:10}});
        const inp=document.createElement('input');
        inp.type='number';inp.inputMode='numeric';inp.className='inp';
        inp.placeholder='0';
        const savedVal=(sVals[item.id]||'').split('|')[0];
        inp.value=savedVal;
        Object.assign(inp.style,{flex:1,fontSize:28,fontWeight:700,textAlign:'center',padding:'12px'});
        numRow.appendChild(inp);
        if(isInvItem){
          const unitSel=document.createElement('select');unitSel.className='inp';
          Object.assign(unitSel.style,{width:'120px',fontSize:13,fontWeight:700,padding:'12px 8px',color:'#0D7390',background:'#E8F4F8',border:'2px solid #B2DDE8',borderRadius:10,cursor:'pointer'});
          const savedUnit=(sVals[item.id]||'').split('|')[1]||'Kilo(s)';
          ['Kilo(s)','Caixa(s)','Bisnaga(s)','UN','Balde(s)','Litro(s)'].forEach(u=>{
            const o=document.createElement('option');o.value=u;o.textContent=u;
            if(u===savedUnit)o.selected=true;
            unitSel.appendChild(o);
          });
          const saveNumUnit=()=>ss({sVals:{...state.sVals,[item.id]:inp.value+'|'+unitSel.value}});
          inp.addEventListener('input',saveNumUnit);
          unitSel.addEventListener('change',saveNumUnit);
          numRow.appendChild(unitSel);
        }else{
          inp.addEventListener('input',e=>ss({sVals:{...sVals,[item.id]:e.target.value}}));
        }
        box.appendChild(numRow);
      }
    if(item.type==='text'){const ta=document.createElement('textarea');ta.className='inp';ta.rows=3;ta.placeholder=isProbText?'Descreva o problema encontrado...':'Escreva suas observações...';ta.value=sVals[item.id]||'';ta.addEventListener('input',e=>ss({sVals:{...sVals,[item.id]:e.target.value}}));box.appendChild(ta);}
    body.appendChild(box);
    if(i<step.step_items.length-1)body.appendChild(div({height:8}));
  });
  // Add item button for inventory
  if(isInvCl){
    const addItemWrap=h('div',{style:{padding:'10px 12px',flexShrink:0}});
    let addMode=false;
    const addBtn=h('button',{style:{width:'100%',padding:'12px',background:'#E8F4F8',border:'2px dashed #0D7390',borderRadius:12,color:'#0D7390',fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:"'Roboto',sans-serif"},
      onClick:()=>{addMode=!addMode;addForm.style.display=addMode?'flex':'none';addBtn.style.display=addMode?'none':'block';}
    },'+ Adicionar item não listado');
    const addForm=h('div',{style:{display:'none',flexDirection:'column',gap:8,background:'#F7F9FC',border:'1px solid #D0D0D0',borderRadius:12,padding:12}});
    const addNameInp=document.createElement('input');
    addNameInp.type='text';addNameInp.className='inp';addNameInp.placeholder='Nome do item (ex: Tomate)';
    const addUnitSel=document.createElement('select');addUnitSel.className='inp';
    Object.assign(addUnitSel.style,{fontSize:13,color:'#0D7390',fontWeight:700});
    ['Kilo(s)','Caixa(s)','Bisnaga(s)','UN','Balde(s)','Litro(s)'].forEach(u=>{const o=document.createElement('option');o.value=u;o.textContent=u;addUnitSel.appendChild(o);});
    const addRow=h('div',{style:{display:'flex',gap:8}});
    const confirmBtn=h('button',{style:{flex:1,padding:'10px',background:'#0D7390',color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:"'Roboto',sans-serif"},
      onClick:async()=>{
        const name=addNameInp.value.trim();
        if(!name)return;
        confirmBtn.textContent='Salvando...';confirmBtn.disabled=true;
        try{
          // Save to DB as new step_item in current step
          const curStep=state.activeList.checklist_steps[state.stepIdx];
          const pos=curStep.step_items.length+1;
          const{data:newItem}=await sb.from('step_items').insert({step_id:curStep.id,type:'number',label:name,position:pos}).select().single();
          if(newItem){
            // Add to current step in state
            curStep.step_items.push(newItem);
            // Set default value
            ss({sVals:{...state.sVals,[newItem.id]:'0|'+addUnitSel.value}});
          }
        }catch(e){alert('Erro ao adicionar: '+e.message);}
        addNameInp.value='';addForm.style.display='none';addBtn.style.display='block';addMode=false;
      }
    },'✓ Salvar');
    const cancelBtn=h('button',{style:{padding:'10px 14px',background:'#EEE',color:'#555',border:'none',borderRadius:8,fontSize:13,cursor:'pointer',fontFamily:"'Roboto',sans-serif"},
      onClick:()=>{addForm.style.display='none';addBtn.style.display='block';addMode=false;}
    },'✕');
    addRow.appendChild(confirmBtn);addRow.appendChild(cancelBtn);
    addForm.appendChild(h('div',{style:{fontSize:12,fontWeight:700,color:'#888',marginBottom:4}},'Novo item para adicionar ao estoque:'));
    addForm.appendChild(addNameInp);
    addForm.appendChild(addUnitSel);
    addForm.appendChild(addRow);
    addItemWrap.appendChild(addBtn);addItemWrap.appendChild(addForm);
    body.appendChild(addItemWrap);
  }

  scr.appendChild(body);
  const btns=div({className:'btn-row'});
  btns.appendChild(h('button',{className:'btn btn-gray',onClick:abandonList},'◀  Voltar'));
  btns.appendChild(h('button',{className:'btn '+(ok?(isLast?'btn-green':'btn-blue'):'btn-gray'),onClick:ok?nextStep:null,disabled:!ok},isLast?'✓  Finalizar':'Próximo  ▶'));
  scr.appendChild(btns);return scr;
}

function render(){
  const root=document.getElementById('root');root.innerHTML='';
  let c;
  try{
    if(state.screen==='loading')c=renderLoading();
    else if(state.screen==='login')c=renderLogin();
    else if(state.screen==='home')c=renderHome();
    else if(state.screen==='exec')c=renderExec();
  }catch(err){
    console.error('❌ Render error:', err);
    const errDiv=document.createElement('div');
    errDiv.style.cssText='padding:20px;color:red;font-family:Roboto,sans-serif;font-size:13px;';
    errDiv.textContent='Erro: '+err.message;
    root.appendChild(errDiv);
    return;
  }
  if(c){c.className='screen';root.appendChild(c);}
}
render();init();
</script>
</body>
</html>
