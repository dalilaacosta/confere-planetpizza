<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ConfereOps — Painel do Gestor</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#EBEBEB;font-family:'Roboto',sans-serif;min-height:100vh;font-size:14px}
#root{min-height:100vh;display:flex;flex-direction:column}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
.fade{animation:fadeIn .2s ease}

/* Top bar */
.top-bar{background:#0D7390;height:48px;display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:100}
.top-bar-logo{color:#fff;font-size:16px;font-weight:900;letter-spacing:.04em}
.top-bar-sub{color:rgba(255,255,255,.6);font-size:12px}
.top-bar-user{margin-left:auto;display:flex;align-items:center;gap:10px}
.top-bar-name{color:#fff;font-size:13px;font-weight:700}
.top-bar-logout{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:11px;font-weight:700;padding:5px 12px;cursor:pointer;letter-spacing:.05em;font-family:'Roboto',sans-serif;text-transform:uppercase}

/* Nav tabs */
.nav{background:#1A237E;display:flex;overflow-x:auto;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.1)}
.nav::-webkit-scrollbar{display:none}
.nav-tab{border:none;background:transparent;color:rgba(255,255,255,.6);font-size:12px;font-weight:700;padding:12px 18px;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s;font-family:'Roboto',sans-serif}
.nav-tab.active{color:#fff;border-bottom-color:#FFD54F}
.nav-tab:hover:not(.active){color:rgba(255,255,255,.85)}

/* Layout */
.content{padding:16px;max-width:1200px;margin:0 auto;width:100%}

/* Cards */
.card{background:#fff;border:1px solid #D0D0D0;padding:16px;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:#777;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#fff;border:1px solid #D0D0D0;padding:14px 16px;border-left:4px solid #0D7390}
.kpi-val{font-size:28px;font-weight:900;color:#1A1A1A;line-height:1}
.kpi-label{font-size:11px;font-weight:700;color:#777;letter-spacing:.06em;text-transform:uppercase;margin-top:4px}

/* Section header */
.sec{background:#1A237E;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
.sec span{color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.sec-btn{background:rgba(255,255,255,.2);border:none;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;cursor:pointer;letter-spacing:.04em;font-family:'Roboto',sans-serif;text-transform:uppercase}

/* Table */
.tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid #D0D0D0;border-top:none}
.tbl th{background:#F5F5F5;padding:9px 14px;text-align:left;font-size:11px;font-weight:700;color:#555;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid #D0D0D0}
.tbl td{padding:10px 14px;border-bottom:1px solid #EBEBEB;vertical-align:middle;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:#F5F7FF}

/* Buttons */
.btn{border:none;cursor:pointer;font-family:'Roboto',sans-serif;font-weight:700;transition:all .12s;outline:none}
.btn:active{filter:brightness(.9)}
.btn-primary{background:#1565C0;color:#fff;padding:10px 18px;font-size:13px;letter-spacing:.04em;text-transform:uppercase}
.btn-success{background:#2E7D32;color:#fff;padding:10px 18px;font-size:13px;letter-spacing:.04em;text-transform:uppercase}
.btn-danger{background:#C62828;color:#fff;padding:8px 14px;font-size:12px;letter-spacing:.04em;text-transform:uppercase}
.btn-gray{background:#9E9E9E;color:#fff;padding:10px 18px;font-size:13px;letter-spacing:.04em;text-transform:uppercase}
.btn-sm{padding:5px 10px;font-size:11px;letter-spacing:.04em;text-transform:uppercase}

/* Tags */
.tag{font-size:10px;font-weight:700;padding:3px 8px;letter-spacing:.04em;border-radius:2px;display:inline-block}
.tag-green{background:#E8F5E9;color:#2E7D32}
.tag-red{background:#FFEBEE;color:#C62828}
.tag-blue{background:#E3F2FD;color:#1565C0}
.tag-amber{background:#FFF8E1;color:#B76E00}
.tag-gray{background:#ECEFF1;color:#546E7A}

/* Progress */
.prog-track{height:6px;background:#EBEBEB;overflow:hidden}
.prog-fill{height:100%;transition:width .4s}

/* Forms */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:700;color:#555;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px}
.form-inp{background:#fff;border:1.5px solid #D0D0D0;color:#1A1A1A;font-family:'Roboto',sans-serif;font-size:14px;outline:none;width:100%;padding:10px 12px;transition:border .15s}
.form-inp:focus{border-color:#1565C0}
.form-select{background:#fff;border:1.5px solid #D0D0D0;color:#1A1A1A;font-family:'Roboto',sans-serif;font-size:14px;outline:none;width:100%;padding:10px 12px;cursor:pointer}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:#fff !important;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.modal-hdr{background:#1A237E;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0}
.modal-hdr span{color:#fff;font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}
.modal-close{background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;font-family:'Roboto',sans-serif}
.modal-body{padding:18px}
.modal-footer{padding:14px 18px;border-top:1px solid #EBEBEB;display:flex;gap:8px;justify-content:flex-end}

/* Spinner */
.spinner{width:32px;height:32px;border:3px solid #DDD;border-top-color:#0D7390;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.err-bar{background:#FFEBEE;border-left:4px solid #C62828;padding:10px 14px;font-size:12px;color:#C62828;font-weight:700;margin-bottom:12px}
.ok-bar{background:#E8F5E9;border-left:4px solid #2E7D32;padding:10px 14px;font-size:12px;color:#2E7D32;font-weight:700;margin-bottom:12px}

/* Steps editor */
.step-card{background:#F5F5F5;border:1px solid #D0D0D0;padding:12px;margin-bottom:8px}
.item-row-edit{display:flex;align-items:center;gap:8px;margin-bottom:6px}

/* Login */
.login-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:#fff;border:1px solid #D0D0D0;width:100%;max-width:400px;padding:32px}
.pin-boxes{display:flex;justify-content:center;gap:12px;margin:20px 0}
.pin-box{width:56px;height:68px;border:2px solid #D0D0D0;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;border-radius:4px;transition:all .15s}

/* ── RESPONSIVE ──────────────────────────────────────────────────────── */

/* Tablet */
@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
}

/* Mobile */
@media(max-width:600px){
  /* Layout */
  body{font-size:13px}
  .content{padding:8px}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .kpi{padding:10px 12px}
  .kpi-val{font-size:22px}
  .kpi-label{font-size:10px}
  .form-row{grid-template-columns:1fr}

  /* Top bar */
  .top-bar{height:44px;padding:0 12px}
  .top-bar-logo{font-size:14px}
  .top-bar-sub{display:none}
  .top-bar-user{gap:6px}
  .top-bar-name{font-size:12px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .top-bar-logout{font-size:10px;padding:4px 8px}

  /* Nav tabs - scroll horizontal */
  .nav{flex-wrap:nowrap}
  .nav-tab{padding:9px 11px;font-size:10px;letter-spacing:.03em;white-space:nowrap}

  /* Section header */
  .sec{padding:6px 10px;flex-wrap:wrap;gap:4px}
  .sec-btn{font-size:10px;padding:3px 8px}

  /* Tables - horizontal scroll */
  .tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tbl{min-width:500px}
  .tbl th{padding:7px 10px;font-size:10px}
  .tbl td{padding:8px 10px;font-size:12px}

  /* Cards view for tables on mobile */
  .tbl-card thead{display:none}
  .tbl-card{min-width:unset;border:none;background:transparent}
  .tbl-card tr{display:block;background:#fff;border:1px solid #D0D0D0;margin-bottom:8px;padding:0}
  .tbl-card td{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #F0F0F0;padding:9px 12px;min-width:unset}
  .tbl-card td:last-child{border-bottom:none;flex-wrap:wrap;gap:4px;justify-content:flex-end}
  .tbl-card td::before{content:attr(data-label);font-size:10px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0;margin-right:8px}
  .tbl-card td:last-child::before{display:none}

  /* Buttons */
  .btn-sm{padding:5px 9px;font-size:10px}
  .btn-primary,.btn-success,.btn-danger,.btn-gray{padding:10px 14px;font-size:12px}

  /* Modal - bottom sheet on mobile */
  .overlay{align-items:flex-end;padding:0}
  .modal{max-width:100%;max-height:92vh;overflow-y:auto;border-radius:0}
  .modal-hdr{padding:12px 14px;position:sticky;top:0}
  .modal-body{padding:14px}
  .modal-footer{padding:12px 14px;position:sticky;bottom:0;background:#fff}

  /* Login card */
  .login-card{padding:20px;border:none}
  .pin-box{width:48px;height:60px;font-size:28px}
}

/* Very small */
@media(max-width:360px){
  .nav-tab{padding:8px 8px;font-size:9px}
  .kpi-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createClient}=supabase;
const sb=createClient('https://fmuolonucniwaosseijh.supabase.co','sb_publishable_Ib7zu9sSJmpCIi3Q8j2E2w_6FCR2VVE');

// ── SESSION ───────────────────────────────────────────────────────────────
function getSession(){
  try{return JSON.parse(localStorage.getItem('confere_user'));}
  catch(e){return null;}
}
function requireAuth(){
  const s=getSession();
  if(!s){window.location.href='login.html';return null;}
  return s;
}
function logout(){
  localStorage.removeItem('confere_user');
  window.location.href='login.html';
}
const SESSION=getSession();
if(!SESSION){window.location.href='login.html';}
const COMPANY_ID=SESSION?.company_id;

const PREDEFINED_DOCS=[
  {name:'Armadilha UV',frequency:'monthly',remind:5},
  {name:'ASO — Atestado de Saúde Ocupacional',frequency:'annual',remind:30},
  {name:"Caixa d'água",frequency:'semi-annual',remind:30},
  {name:'CLCB — Certificado de Licença do Corpo de Bombeiros',frequency:'custom',remind:90},
  {name:'Coifa e dutos',frequency:'quarterly',remind:15},
  {name:'Dedetização — Desinsetização',frequency:'quarterly',remind:15},
  {name:'Dedetização — Desratização',frequency:'quarterly',remind:15},
  {name:'Estanqueidade do gás',frequency:'annual',remind:30},
  {name:'Extintores',frequency:'annual',remind:30},
  {name:'Licença Sanitária',frequency:'annual',remind:60},
  {name:'LTCAT — Laudo Técnico das Condições Ambientais do Trabalho',frequency:'annual',remind:30},
  {name:'PCMSO — Programa de Controle Médico de Saúde Ocupacional',frequency:'annual',remind:30},
  {name:'PGR — Programa de Gerenciamento de Riscos',frequency:'annual',remind:30},
  {name:"Potabilidade da água",frequency:'semi-annual',remind:30},
  {name:'Treinamento boas práticas',frequency:'annual',remind:30},
];

const C={teal:"#0D7390",navy:"#1A237E",blue:"#1565C0",green:"#2E7D32",red:"#C62828",amber:"#F9A825",bd:"#D0D0D0",bg:"#F2F2F2",white:"#fff",tx:"#1A1A1A",t2:"#444",t3:"#777"};

let state={
  screen:'loading',
  manager:SESSION,selMgr:null,pin:'',pinErr:false,
  operators:[],checklists:[],units:[],executions:[],issues:[],documents:[],
  selectedUnit:null,
  tab:'overview',
  modal:null,modalData:{},
  saving:false,error:null,success:null,
};

function ss(p){state={...state,...p};render();}

// ── DATA ──────────────────────────────────────────────────────────────────
async function hashPassword(password){
  const msgBuffer=new TextEncoder().encode(password);
  const hashBuffer=await crypto.subtle.digest('SHA-256',msgBuffer);
  return Array.from(new Uint8Array(hashBuffer)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function init(){
  if(!SESSION){window.location.href='login.html';return;}
  // Show loading screen immediately
  ss({screen:'loading'});
  try{
    const [opsR,clsR,unitsR]=await Promise.all([
      sb.from('operators').select('*').eq('company_id',COMPANY_ID).order('name'),
      sb.from('checklists').select('*, checklist_steps(id,name,position,step_items(id,type,label,position))').eq('company_id',COMPANY_ID).order('sector'),
      sb.from('units').select('*').eq('company_id',COMPANY_ID).order('name'),
    ]);
    const cls=clsR.data||[];
    cls.forEach(cl=>{
      cl.checklist_steps.sort((a,b)=>a.position-b.position);
      cl.checklist_steps.forEach(s=>s.step_items.sort((a,b)=>a.position-b.position));
    });
    const managers=(opsR.data||[]).filter(o=>['manager','leader'].includes(o.access_level));
    const execs=await loadExecs();
    const issuesR=await sb.from('issues').select('*, operators(name), checklists(name)').eq('status','open').order('created_at',{ascending:false});
    const docsR=await sb.from('documents').select('*, units(name)').order('expiry_date');
    const {data:companyData}=await sb.from('companies').select('*').eq('id',COMPANY_ID).single();
    ss({screen:'unit_select',operators:opsR.data||[],checklists:cls,units:unitsR.data||[],executions:execs,issues:issuesR.data||[],documents:docsR.data||[],companyData:companyData||{}});
  }catch(e){console.error(e);ss({screen:'dashboard',error:'Erro ao carregar dados. Recarregue a página.'});}
}

async function loadExecs(){
  const d=new Date();d.setHours(0,0,0,0);
  let q=sb.from('executions').select('*, operators(id,name), checklists(name,sector)').eq('company_id',COMPANY_ID).gte('started_at',d.toISOString()).order('started_at',{ascending:false});
  // Filter by selected unit's operators
  if(state.selectedUnit){
    const unitOpIds=state.operators.filter(o=>o.unit_id===state.selectedUnit.id).map(o=>o.id);
    if(unitOpIds.length>0)q=q.in('operator_id',unitOpIds);
    else return [];
  }
  const {data}=await q;
  return data||[];
}

async function reload(){
  // Preserve current navigation state
  const currentScreen=state.screen;
  const currentUnit=state.selectedUnit;
  const currentTab=state.tab;
  const [opsR,clsR,unitsR,issR,docsR]=await Promise.all([
    sb.from('operators').select('*').eq('company_id',COMPANY_ID).order('name'),
    sb.from('checklists').select('*, checklist_steps(id,name,position,step_items(id,type,label,position))').eq('company_id',COMPANY_ID).order('sector'),
    sb.from('units').select('*').eq('company_id',COMPANY_ID).order('name'),
    sb.from('issues').select('*, operators(name), checklists(name)').eq('status','open').order('created_at',{ascending:false}),
    sb.from('documents').select('*, units(name)').eq('company_id',COMPANY_ID).order('expiry_date'),
  ]);
  const cls=clsR.data||[];
  cls.forEach(cl=>{cl.checklist_steps.sort((a,b)=>a.position-b.position);cl.checklist_steps.forEach(s=>s.step_items.sort((a,b)=>a.position-b.position));});
  const execs=await loadExecs();
  ss({
    screen:currentScreen,
    selectedUnit:currentUnit,
    tab:currentTab,
    operators:opsR.data||[],checklists:cls,units:unitsR.data||[],
    executions:execs,issues:issR.data||[],documents:docsR.data||[]
  });
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
async function saveOperator(data,id){
  const nav={screen:state.screen,selectedUnit:state.selectedUnit,tab:state.tab};
  ss({saving:true,...nav});
  try{
    if(id){await sb.from('operators').update(data).eq('id',id);}
    else{await sb.from('operators').insert(data);}
    await reload();
    ss({...nav,saving:false,modal:null,modalData:{},success:id?'Operador atualizado!':'Operador cadastrado!'});
    setTimeout(()=>ss({...nav,success:null}),3000);
  }catch(e){ss({...nav,saving:false,error:'Erro ao salvar.'});}
}

async function toggleOperator(id,active){
  await sb.from('operators').update({active}).eq('id',id);
  await reload();
}

async function saveChecklist(data,id){
  const nav={screen:state.screen,selectedUnit:state.selectedUnit,tab:state.tab};
  ss({saving:true,...nav});
  try{
    if(id){
      await sb.from('checklists').update(data).eq('id',id);
    }else{
      const {data:newCl,error}=await sb.from('checklists').insert(data).select().single();
      if(error)throw error;
      const {data:step}=await sb.from('checklist_steps').insert({checklist_id:newCl.id,position:999}).select().single();
      await sb.from('step_items').insert([
        {step_id:step.id,type:'check',label:'Detectou algo quebrado ou com problema de funcionamento?',position:1},
        {step_id:step.id,type:'text',label:'Se sim, descreva o problema encontrado:',position:2},
        {step_id:step.id,type:'photo',label:'Foto do problema (opcional)',position:3},
      ]);
    }
    await reload();
    ss({...nav,saving:false,modal:null,modalData:{},success:id?'Checklist atualizado!':'Checklist criado!'});
    setTimeout(()=>ss({...nav,success:null}),3000);
  }catch(e){ss({...nav,saving:false,error:'Erro ao salvar: '+(e.message||'')});}
}

async function toggleChecklist(id,active){
  await sb.from('checklists').update({active}).eq('id',id);
  await reload();
}

async function resolveIssue(id){
  await sb.from('issues').update({status:'resolved',resolved_at:new Date().toISOString(),resolved_by:state.manager?.name}).eq('id',id);
  await reload();
}

async function addStep(checklistId,position){
  ss({saving:true});
  const {data}=await sb.from('checklist_steps').insert({checklist_id:checklistId,position}).select().single();
  await reload();
  ss({saving:false});
  return data;
}

async function deleteStep(stepId){
  await sb.from('checklist_steps').delete().eq('id',stepId);
  await reload();
}

async function saveItem(stepId,type,label,position,itemId){
  if(itemId){await sb.from('step_items').update({type,label}).eq('id',itemId);}
  else{await sb.from('step_items').insert({step_id:stepId,type,label,position});}
  await reload();
}

async function deleteItem(itemId){
  await sb.from('step_items').delete().eq('id',itemId);
  await reload();
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on')&&typeof v==='function')el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='className')el.className=v;
    else if(k==='disabled')el.disabled=v;
    else if(k==='innerHTML')el.innerHTML=v;
    else if(k in el)el[k]=v;
    else el.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return el;
}
const div=(s,...c)=>h('div',{style:s},...c);
const sec=(label,btnLabel,btnClick)=>{
  const d=h('div',{className:'sec'});
  d.appendChild(h('span',{},label));
  if(btnLabel)d.appendChild(h('button',{className:'sec-btn',onClick:btnClick},btnLabel));
  return d;
};
function pct(n,t){return t>0?Math.round((n/t)*100):0;}
function pctColor(p){return p>=80?C.green:p>=50?C.amber:C.red;}

// ── LOGIN ─────────────────────────────────────────────────────────────────
function renderLogin(){
  const {selMgr,pinErr,error,managers=[]}=state;
  const root=div({display:'flex',flexDirection:'column',minHeight:'100vh'});
  root.appendChild(h('div',{className:'top-bar'},
    h('div',{style:{fontSize:16,fontWeight:900,color:'#fff',letterSpacing:'.04em'}},'ConfereOps'),
    h('span',{style:{color:'rgba(255,255,255,.6)',fontSize:12,marginLeft:8}},'· Painel do Gestor')
  ));

  const wrap=div({className:'login-wrap'});
  const card=div({className:'login-card'});
  card.appendChild(div({fontSize:18,fontWeight:900,color:C.navy,marginBottom:4,letterSpacing:'.02em'},'ACESSO RESTRITO'));
  card.appendChild(div({fontSize:13,color:C.t3,marginBottom:20},'Somente gestores e líderes autorizados.'));
  if(error)card.appendChild(h('div',{className:'err-bar'},error));

  if(!selMgr){

      ));
    });

    card.appendChild(div({display:'flex',alignItems:'center',gap:12,padding:'12px',background:C.bg,border:`1px solid ${C.bd}`,marginBottom:16},
      div({width:40,height:40,borderRadius:'50%',background:C.navy,display:'flex',alignItems:'center',
        justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',flexShrink:0},selMgr.initials),
      div({flex:1},div({fontSize:15,fontWeight:700,color:C.tx},selMgr.name),div({fontSize:12,color:C.t3,marginTop:2},selMgr.access_level==='manager'?'Gestor':'Líder')),
      h('button',{className:'btn',onClick:()=>ss({selMgr:null,pin:''}),
        style:{background:C.white,border:`1px solid ${C.bd}`,color:C.t3,fontSize:11,padding:'5px 10px',
          cursor:'pointer',fontFamily:"'Roboto',sans-serif",textTransform:'uppercase',letterSpacing:'.04em'}},'Trocar')
    ));

    card.appendChild(div({fontSize:11,fontWeight:700,color:C.t3,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:8},'PIN de Acesso'));

    const pinWrap=div({position:'relative',display:'flex',justifyContent:'center',gap:10,marginBottom:8,cursor:'text'});
    const boxes=[];
    for(let i=0;i<4;i++){
      const box=div({className:'pin-box'});
      box.style.borderColor=C.bd;
      boxes.push(box);pinWrap.appendChild(box);
    }
    const errMsg=div({textAlign:'center',color:C.red,fontSize:12,fontWeight:700,marginTop:8,display:'none'},'PIN INCORRETO');
    const inp=document.createElement('input');
    inp.type='tel';inp.inputMode='numeric';inp.maxLength=4;inp.autocomplete='off';
    Object.assign(inp.style,{position:'absolute',top:0,left:0,width:'100%',height:'100%',opacity:'0.01',fontSize:'32px',border:'none',background:'transparent',cursor:'text',zIndex:'10'});
    function updateBoxes(val,isErr){
      boxes.forEach((b,i)=>{b.textContent=i<val.length?'●':'';b.style.borderColor=isErr?C.red:i<=val.length&&val.length>0?C.blue:C.bd;b.style.background=isErr?'#FFEBEE':i<val.length?'#E3F2FD':C.white;});
    }
    inp.addEventListener('input',e=>{
      const val=e.target.value.replace(/[^0-9]/g,'').slice(0,4);
      e.target.value=val;errMsg.style.display='none';updateBoxes(val,false);
      if(val.length===4){
        const op=state.operators.find(o=>o.pin===val&&o.id===selMgr.id&&['manager','leader'].includes(o.access_level));
        if(op){ss({manager:op,screen:'dashboard',pin:'',selMgr:null});}
        else{updateBoxes(val,true);errMsg.style.display='block';setTimeout(()=>{inp.value='';updateBoxes('',false);errMsg.style.display='none';},900);}
      }
    });
    pinWrap.appendChild(inp);pinWrap.addEventListener('click',()=>inp.focus());
    card.appendChild(pinWrap);card.appendChild(errMsg);
    setTimeout(()=>inp.focus(),150);
  }

  wrap.appendChild(card);root.appendChild(wrap);
  return root;
}

// ── DOCUMENT HELPERS ─────────────────────────────────────────────────────
function docStatus(doc){
  const today=new Date();today.setHours(0,0,0,0);
  const exp=new Date(doc.expiry_date);exp.setHours(0,0,0,0);
  const diffDays=Math.round((exp-today)/(1000*60*60*24));
  if(diffDays<0)return{label:'VENCIDO',days:diffDays,cls:'tag-red',color:'#C62828',bg:'#FFEBEE'};
  if(diffDays<=doc.remind_days_before)return{label:'VENCE EM '+diffDays+'d',days:diffDays,cls:'tag-amber',color:'#B76E00',bg:'#FFF8E1'};
  return{label:'EM DIA',days:diffDays,cls:'tag-green',color:'#2E7D32',bg:'#E8F5E9'};
}

function freqLabel(f){return{monthly:'Mensal',quarterly:'Trimestral','semi-annual':'Semestral',annual:'Anual',custom:'Data específica'}[f]||f;}

        }},'💾');
        hdr.appendChild(badge);hdr.appendChild(nameInp);hdr.appendChild(saveNameBtn);

          sc.appendChild(ir);

// ── TAB: DOCUMENTS ────────────────────────────────────────────────────────
function renderDocuments(){
  const {documents,units,modal,modalData,saving,error,success}=state;
  const frag=document.createDocumentFragment();
  if(success)frag.appendChild(h('div',{className:'ok-bar'},success));
  if(error)frag.appendChild(h('div',{className:'err-bar'},error));

  // KPIs
  const expired=documents.filter(d=>docStatus(d).days<0).length;
  const expiringSoon=documents.filter(d=>{const s=docStatus(d);return s.days>=0&&s.days<=d.remind_days_before;}).length;
  const ok=documents.filter(d=>docStatus(d).days>d.remind_days_before).length;
  const kpis=div({className:'kpi-grid',style:{gridTemplateColumns:'repeat(3,1fr)'}});
  [{val:expired,label:'Vencidos',color:'#C62828'},{val:expiringSoon,label:'Vence em breve',color:'#B76E00'},{val:ok,label:'Em dia',color:'#2E7D32'}].forEach(k=>{
    kpis.appendChild(div({className:'kpi',style:{borderLeftColor:k.color}},div({className:'kpi-val',style:{color:k.color}},String(k.val)),div({className:'kpi-label'},k.label)));
  });
  frag.appendChild(kpis);

  // List by unit
  const unitIds=[...new Set(documents.map(d=>d.unit_id))];
  const allUnits=[...units.filter(u=>unitIds.includes(u.id))];
  // Also add docs without unit
  if(documents.some(d=>!d.unit_id)) allUnits.push({id:null,name:'Sem unidade'});

  if(allUnits.length===0){
    frag.appendChild(sec('Documentos Cadastrados','+ Novo Documento',()=>ss({modal:'document',modalData:{remind_days_before:30,renewal_frequency:'annual'}})));
    frag.appendChild(div({background:'#fff',border:'1px solid #D0D0D0',borderTop:'none',padding:'32px',textAlign:'center',color:'#777',fontSize:13},'Nenhum documento cadastrado ainda.'));
  }

  allUnits.forEach(unit=>{
    const unitDocs=documents.filter(d=>(d.unit_id||null)===(unit.id||null));
    frag.appendChild(sec((unit.name||'Geral').toUpperCase()+' — '+unitDocs.length+' documentos','+ Novo',()=>ss({modal:'document',modalData:{remind_days_before:30,renewal_frequency:'annual',unit_id:unit.id}})));
    const tbl=h('table',{className:'tbl'});
    tbl.appendChild(h('thead',{},h('tr',{},h('th',{},'Documento'),h('th',{},'Vencimento'),h('th',{},'Renovação'),h('th',{},'Lembrar'),h('th',{},'Status'),h('th',{},'Ações'))));
    const tbody=h('tbody',{});
    unitDocs.forEach(doc=>{
      const st=docStatus(doc);

              try{const path=doc.file_url.split('/storage/v1/object/public/photos/')[1];await sb.storage.from('photos').remove([path]);}catch(e){}

            await sb.from('documents').delete().eq('id',doc.id);

  frag.appendChild(div({textAlign:'right',marginBottom:16},
    h('button',{className:'btn btn-primary',onClick:()=>ss({modal:'document',modalData:{remind_days_before:30,renewal_frequency:'annual'}})},'+ Novo Documento')
  ));

  // Modal documento
  if(modal==='document'){
    const md=modalData;const isEdit=!!md.id;
    let aiLoading=false;let selectedFile=null;let expiryInp=null;
    const overlay=h('div',{className:'overlay',onClick:e=>{if(e.target===overlay)ss({modal:null,modalData:{}});}});
    const m=h('div',{className:'modal'});
    m.appendChild(h('div',{className:'modal-hdr'},h('span',{},isEdit?'Editar Documento':'Novo Documento'),h('button',{className:'modal-close',onClick:()=>ss({modal:null,modalData:{}})},'×')));
    const mb=h('div',{className:'modal-body'});

    // ── AI Upload Section ──────────────────────────────────────────────
    const aiSection=div({background:'#F0F4FF',border:'1.5px dashed #1565C0',padding:'14px',marginBottom:16});
    aiSection.appendChild(div({fontSize:11,fontWeight:700,color:'#1565C0',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:8},'📎  Anexar e analisar documento com IA'));
    aiSection.appendChild(div({fontSize:12,color:'#555',marginBottom:10},'Envie o PDF ou foto do documento. A IA lê automaticamente o nome e data de vencimento.'));

    const aiStatus=div({fontSize:12,fontWeight:700,marginTop:8,display:'none'});
    const fileInput=document.createElement('input');fileInput.type='file';fileInput.accept='application/pdf,image/*';fileInput.style.display='none';

    const fileBtn=h('button',{className:'btn btn-primary',style:{fontSize:12,padding:'8px 14px'},onClick:()=>fileInput.click()},'📎 Selecionar arquivo');
    const fileName=div({fontSize:12,color:'#555',marginTop:6,display:'none'});

    fileInput.addEventListener('change',async e=>{
      const f=e.target.files?.[0];if(!f)return;
      selectedFile=f;
      fileName.textContent='📄 '+f.name;fileName.style.display='block';
      aiStatus.textContent='⏳ Analisando documento com IA...';aiStatus.style.color='#1565C0';aiStatus.style.display='block';
      fileBtn.disabled=true;fileBtn.textContent='Analisando...';

      try{
        // Convert to base64
        const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f);});
        const isPDF=f.type==='application/pdf';
        const contentPart=isPDF?{type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}}:{type:'image',source:{type:'base64',media_type:f.type,data:base64}};
        
        const resp=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            model:'claude-sonnet-4-20250514',max_tokens:500,
            messages:[{role:'user',content:[
              contentPart,
              {type:'text',text:'Analise este documento oficial e extraia as informações em JSON puro sem markdown. Formato: {"nome":"nome do documento","data_vencimento":"YYYY-MM-DD ou null","tipo":"tipo do documento"}. Se não encontrar data, retorne null. Responda APENAS o JSON.'}
            ]}]
          })
        });
        const data=await resp.json();
        const text=data.content?.[0]?.text||'{}';
        const info=JSON.parse(text.replace(/```json|```/g,'').trim());

        // Auto-fill fields
        if(info.nome&&!md.name){md.name=info.nome;nameInp.value=info.nome;}
        if(info.data_vencimento){md.expiry_date=info.data_vencimento;expiryInp.value=info.data_vencimento;}

        aiStatus.textContent='✅ Documento analisado! Verifique os campos preenchidos automaticamente.';aiStatus.style.color='#2E7D32';
      }catch(err){
        aiStatus.textContent='⚠️ Não foi possível ler automaticamente. Preencha manualmente.';aiStatus.style.color='#B76E00';
      }
      fileBtn.disabled=false;fileBtn.textContent='📎 Trocar arquivo';
    });

    aiSection.appendChild(fileBtn);aiSection.appendChild(fileName);aiSection.appendChild(aiStatus);
    mb.appendChild(aiSection);

    // ── Form fields ────────────────────────────────────────────────────
    function fld(label,key,type='text',placeholder=''){
      const g=div({className:'form-group'});
      g.appendChild(h('label',{className:'form-label'},label));
      const el=document.createElement('input');el.type=type;el.className='form-inp';el.value=md[key]||'';el.placeholder=placeholder;
      el.addEventListener('input',e=>{md[key]=type==='number'?Number(e.target.value):e.target.value;});
      g.appendChild(el);return{g,el};
    }
    function sel(label,key,opts){
      const g=div({className:'form-group'});
      g.appendChild(h('label',{className:'form-label'},label));
      const el=document.createElement('select');el.className='form-select';
      opts.forEach(([v,l])=>{const o=document.createElement('option');o.value=v;o.textContent=l;if(String(md[key])===String(v))o.selected=true;el.appendChild(o);});
      el.addEventListener('change',e=>{md[key]=el.options[el.selectedIndex].value;});
      g.appendChild(el);return g;
    }

    const{g:nameG,el:nameInp}=fld('Nome do documento','name','text','Ex: Alvará de Funcionamento');
    mb.appendChild(nameG);
    mb.appendChild(div({className:'form-row'},
      sel('Unidade','unit_id',[['','— Geral —'],...units.map(u=>[u.id,u.name])]),
      (()=>{const{g,el}=fld('Data de vencimento','expiry_date','date');expiryInp=el;return g;})()
    ));
    mb.appendChild(div({className:'form-row'},
      sel('Frequência de renovação','renewal_frequency',[['monthly','Mensal'],['quarterly','Trimestral'],['semi-annual','Semestral'],['annual','Anual'],['custom','Data específica']]),
      fld('Lembrar quantos dias antes','remind_days_before','number','Ex: 30').g
    ));
    const gNotes=div({className:'form-group'});
    gNotes.appendChild(h('label',{className:'form-label'},'Observações (opcional)'));
    const taNotes=document.createElement('textarea');taNotes.className='form-inp';taNotes.rows=2;taNotes.value=md.notes||'';taNotes.addEventListener('input',e=>{md.notes=e.target.value;});
    gNotes.appendChild(taNotes);mb.appendChild(gNotes);

    // File preview if already has file_url
    if(md.file_url){mb.appendChild(div({fontSize:12,color:'#1565C0',marginTop:4},h('a',{href:md.file_url,target:'_blank',style:{color:'#1565C0'}},'📎 Ver documento anexado')));}

    m.appendChild(mb);
    m.appendChild(h('div',{className:'modal-footer'},
      h('button',{className:'btn btn-gray',onClick:()=>ss({modal:null,modalData:{}})},'Cancelar'),
      h('button',{className:'btn btn-primary',disabled:saving,onClick:async()=>{
        if(!md.name||!md.expiry_date){ss({error:'Nome e data de vencimento são obrigatórios.'});return;}
        ss({saving:true});
        let fileUrl=md.file_url||null;
        // Upload file if selected
        if(selectedFile){
          try{
            const safeName=selectedFile.name.replace(/[^a-zA-Z0-9._-]/g,'_');
            const path='documents/'+Date.now()+'_'+safeName;
            const{error:upErr}=await sb.storage.from('photos').upload(path,selectedFile,{upsert:true,contentType:selectedFile.type});
            if(upErr){
              alert('Erro ao fazer upload: '+upErr.message+'. Verifique o bucket de armazenamento.');
              ss({saving:false});return;
            }
            const{data:{publicUrl}}=sb.storage.from('photos').getPublicUrl(path);
            fileUrl=publicUrl;
          }catch(upEx){
            alert('Erro no upload: '+upEx.message);
            ss({saving:false});return;
          }
        }
        const data={name:md.name,unit_id:md.unit_id||null,expiry_date:md.expiry_date,renewal_frequency:md.renewal_frequency||'annual',remind_days_before:Number(md.remind_days_before)||30,notes:md.notes||null,file_url:fileUrl,status:'active',company_id:COMPANY_ID};
        if(isEdit){await sb.from('documents').update(data).eq('id',md.id);}
        else{await sb.from('documents').insert(data);}
        await reload();ss({saving:false,modal:null,modalData:{},success:isEdit?'Documento atualizado!':'Documento cadastrado!'});
        setTimeout(()=>ss({success:null}),3000);
      }},saving?'Salvando...':'Salvar')
    ));
    overlay.appendChild(m);frag.appendChild(overlay);
  }

  return frag;
}

  ));

          razao_social:company.razao_social||null,

          inscricao_municipal:company.inscricao_municipal||null,
          endereco:company.endereco||null,
          telefone:company.telefone||null,
          celular:company.celular||null,
          responsavel:company.responsavel||null,
          email:company.email||null,
        }).eq('id',COMPANY_ID);
        ss({saving:false,success:'Dados salvos com sucesso!'});
        setTimeout(()=>ss({success:null}),3000);
      }catch(e){ss({saving:false,error:'Erro ao salvar.'});}
    }},saving?'Salvando...':'💾  Salvar Dados')
  ));

  // ── Alterar Senha ──────────────────────────────────────────────────────

  const passCard=div({background:'#fff',border:'1px solid #D0D0D0',borderTop:'none',padding:'20px'});
  let passData={current:'',novo:'',confirma:''};

  function passField(label,key,ph){
    const g=div({marginBottom:'14px'});
    g.appendChild(h('label',{className:'form-label'},label));
    const el=document.createElement('input');el.type='password';el.className='form-inp';el.placeholder=ph;
    el.addEventListener('input',e=>{passData[key]=e.target.value;});
    g.appendChild(el);return g;
  }

  passCard.appendChild(div({fontSize:12,color:'#777',marginBottom:16,lineHeight:1.6},'Para alterar sua senha, confirme a senha atual e depois defina a nova senha.'));
  passCard.appendChild(row3(
    passField('Senha Atual','current','Digite a senha atual'),
    passField('Nova Senha','novo','Mínimo 6 caracteres'),
    passField('Confirmar Nova Senha','confirma','Repita a nova senha')
  ));
  const passErr=div({fontSize:12,color:'#C62828',fontWeight:700,marginBottom:10,display:'none'});
  passCard.appendChild(passErr);

  passCard.appendChild(div({textAlign:'right'},
    h('button',{className:'btn btn-primary',style:{padding:'10px 28px'},onClick:async()=>{
      passErr.style.display='none';
      if(!passData.current){passErr.textContent='Digite a senha atual.';passErr.style.display='block';return;}
      if(passData.novo.length<6){passErr.textContent='Nova senha deve ter pelo menos 6 caracteres.';passErr.style.display='block';return;}
      if(passData.novo!==passData.confirma){passErr.textContent='Nova senha e confirmação não coincidem.';passErr.style.display='block';return;}

      }catch(e){ss({saving:false,error:'Erro ao alterar senha.'});}
    }},'🔒  Alterar Senha')
  ));
  frag.appendChild(passCard);
  return frag;
}

      h('td',{},h('span',{className:'tag '+st.cls},st.label)),

        h('button',{className:'btn btn-primary btn-sm',style:{marginRight:4},onClick:()=>ss({modal:'document',modalData:{...doc}})},'Editar'),
        doc.file_url?h('a',{href:doc.file_url,target:'_blank',style:{display:'inline-block',marginRight:4,padding:'5px 9px',background:'#0D7390',color:'#fff',fontSize:11,fontWeight:700,textDecoration:'none'}},'📎 Ver'):h('span',{style:{fontSize:11,color:'#aaa',marginRight:4}},'—'),
        h('button',{className:`btn btn-sm ${doc.status!=='archived'?'btn-gray':'btn-success'}`,style:{marginRight:4},onClick:async()=>{
          await sb.from('documents').update({status:doc.status==='archived'?'active':'archived'}).eq('id',doc.id);
          await reload();
        }},doc.status==='archived'?'Reativar':'Arquivar'),
        h('button',{className:'btn btn-danger btn-sm',onClick:async()=>{
            if(confirm('Excluir "'+doc.name+'"? O arquivo também será removido.')){
              if(doc.file_url&&doc.file_url.includes('/storage/v1/object/public/photos/')){
                try{const path=doc.file_url.split('/storage/v1/object/public/photos/')[1];await sb.storage.from('photos').remove([path]);}catch(e){}

            }
        }},'Excluir')
      )

  tbl.appendChild(tbody);frag.appendChild(tbl);
  if(modal==='document'){
    const md=modalData;const isEdit=!!md.id;
    let expiryInp=null,selectedFile=null,freqSelect=null,remindInp=null;
    const overlay=h('div',{className:'overlay',style:{alignItems:'center',padding:'20px'},onClick:e=>{if(e.target===overlay)ss({modal:null,modalData:{}});}});
    const m=h('div',{className:'modal',style:{maxWidth:'580px',background:'#fff',borderRadius:'4px',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 8px 32px rgba(0,0,0,.25)'}});
    m.appendChild(h('div',{className:'modal-hdr'},h('span',{},isEdit?'Editar Documento':'Novo Documento'),h('button',{className:'modal-close',onClick:()=>ss({modal:null,modalData:{}})},'×')));
    const mb=h('div',{className:'modal-body'});

    // PDF.js worker
    if(window.pdfjsLib)window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    async function extractDateFromPDF(file){
      if(!window.pdfjsLib||file.type!=='application/pdf')return null;
      try{
        const buf=await file.arrayBuffer();
        const pdf=await window.pdfjsLib.getDocument({data:buf}).promise;
        let text='';
        for(let i=1;i<=Math.min(pdf.numPages,5);i++){
          const page=await pdf.getPage(i);
          const tc=await page.getTextContent();
          text+=tc.items.map(x=>x.str).join(' ')+' ';
        }
        const labeled=text.match(/(?:validade|vencimento|v.lido\s+at.|v.lida\s+at.)[:\s]+(\d{2}[\/.\-]\d{2}[\/.\-]\d{4})/i);
        if(labeled){const p=labeled[1].replace(/[.\-]/g,'/').split('/');return p[2]+'-'+p[1]+'-'+p[0];}
        const all=[...text.matchAll(/(\d{2})[\/.](\d{2})[\/.](\d{4})/g)];
        const today=new Date();
        const future=all.map(m=>{try{return{d:new Date(m[3]+'-'+m[2]+'-'+m[1]),str:m[3]+'-'+m[2]+'-'+m[1]};}catch(e){return null;}}).filter(x=>x&&x.d>today).sort((a,b)=>b.d-a.d);
        return future.length>0?future[0].str:null;
      }catch(e){return null;}
    }

    // Nome com sugestões pré-definidas
    const nameGroup=h('div',{className:'form-group'});
    nameGroup.appendChild(h('label',{className:'form-label'},'Nome do Documento'));
    const nameWrap=h('div',{style:{position:'relative'}});
    const nameInp=document.createElement('input');
    nameInp.type='text';nameInp.className='form-inp';
    nameInp.value=md.name||'';nameInp.placeholder='Selecione ou digite o nome...';nameInp.autocomplete='off';
    const suggestBox=h('div',{style:{position:'absolute',top:'100%',left:0,right:0,background:'#fff',border:'1px solid #1565C0',maxHeight:'200px',overflowY:'auto',zIndex:100,display:'none',boxShadow:'0 4px 12px rgba(0,0,0,.15)'}});
    function showSugg(docs){
      suggestBox.innerHTML='';
      docs.forEach(doc=>{
        const item=h('div',{style:{padding:'9px 14px',cursor:'pointer',fontSize:13,borderBottom:'1px solid #F0F0F0',lineHeight:1.4}},
          h('div',{style:{fontWeight:700,color:'#1A1A1A'}},doc.name),
          h('div',{style:{fontSize:11,color:'#777',marginTop:2}},freqLabel(doc.frequency)+' · Alerta '+doc.remind+' dias antes')
        );
        item.addEventListener('mouseover',()=>item.style.background='#F0F4FF');
        item.addEventListener('mouseout',()=>item.style.background='#fff');
        item.addEventListener('mousedown',()=>{
          nameInp.value=doc.name;md.name=doc.name;
          md.renewal_frequency=doc.frequency;md.remind_days_before=doc.remind;
          if(freqSelect)freqSelect.value=doc.frequency;
          if(remindInp)remindInp.value=String(doc.remind);
          suggestBox.style.display='none';
        });
        suggestBox.appendChild(item);
      });
      suggestBox.style.display=docs.length>0?'block':'none';
    }
    nameInp.addEventListener('input',e=>{md.name=e.target.value;const q=e.target.value.toLowerCase();showSugg(q?PREDEFINED_DOCS.filter(d=>d.name.toLowerCase().includes(q)):PREDEFINED_DOCS);});
    nameInp.addEventListener('focus',()=>showSugg(PREDEFINED_DOCS));
    nameInp.addEventListener('blur',()=>setTimeout(()=>{suggestBox.style.display='none';},200));
    nameWrap.appendChild(nameInp);nameWrap.appendChild(suggestBox);
    nameGroup.appendChild(nameWrap);
    mb.appendChild(nameGroup);

    // File upload com leitura de data
    const aiSection=h('div',{style:{background:'#F0F4FF',border:'1.5px dashed #1565C0',padding:'14px',marginBottom:0,marginTop:14}});
    aiSection.appendChild(h('div',{style:{fontSize:11,fontWeight:700,color:'#1565C0',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}},'📎  Anexar Documento'));
    aiSection.appendChild(h('div',{style:{fontSize:12,color:'#555',marginBottom:10}},'Selecione o PDF — o sistema tenta ler a data de vencimento automaticamente.'));
    const aiStatus=h('div',{style:{fontSize:12,fontWeight:700,marginTop:8,display:'none'}});
    const fileInput=document.createElement('input');fileInput.type='file';fileInput.accept='application/pdf,image/*';fileInput.style.display='none';
    const fileBtn=h('button',{className:'btn btn-primary',style:{fontSize:12,padding:'8px 14px'},onClick:()=>fileInput.click()},'📎 Selecionar arquivo');
    const fileName=h('div',{style:{fontSize:12,color:'#555',marginTop:6,display:'none'}});
    fileInput.addEventListener('change',async e=>{
      const f=e.target.files?.[0];if(!f)return;selectedFile=f;
      fileName.textContent='📄 '+f.name;fileName.style.display='block';
      fileBtn.disabled=true;fileBtn.textContent='Lendo...';
      aiStatus.textContent='⏳ Extraindo data de vencimento...';aiStatus.style.color='#1565C0';aiStatus.style.display='block';
      const date=await extractDateFromPDF(f);
      if(date&&expiryInp){expiryInp.value=date;md.expiry_date=date;aiStatus.textContent='✅ Data encontrada! Verifique o campo abaixo.';aiStatus.style.color='#2E7D32';}
      else{aiStatus.textContent='⚠️ Data não encontrada. Preencha manualmente.';aiStatus.style.color='#B76E00';}
      fileBtn.disabled=false;fileBtn.textContent='📎 Trocar arquivo';
    });
    aiSection.appendChild(fileBtn);aiSection.appendChild(fileName);aiSection.appendChild(aiStatus);
    mb.appendChild(aiSection);

    function fld(label,key,type='text',ph=''){
      const g=h('div',{className:'form-group',style:{marginTop:'14px'}});g.appendChild(h('label',{className:'form-label'},label));
      const el=document.createElement('input');el.type=type;el.className='form-inp';el.value=md[key]||'';if(ph)el.placeholder=ph;
      el.addEventListener('input',e=>{md[key]=e.target.value;});g.appendChild(el);return{g,el};
    }
    function selFld(label,key,opts){
      const g=h('div',{className:'form-group',style:{marginTop:'14px'}});g.appendChild(h('label',{className:'form-label'},label));
      const el=document.createElement('select');el.className='form-select';
      opts.forEach(([v,l])=>{const o=document.createElement('option');o.value=v;o.textContent=l;if(String(md[key])===String(v))o.selected=true;el.appendChild(o);});
      el.addEventListener('change',e=>{md[key]=e.target.value;});g.appendChild(el);return g;
    }

    const row1=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginTop:'14px'}});
    row1.appendChild(selFld('Unidade','unit_id',[['','— Geral —'],...units.map(u=>[u.id,u.name])]));
    const{g:expG,el:expEl}=fld('Data de vencimento','expiry_date','date','');expiryInp=expEl;expG.style.marginTop='0';row1.appendChild(expG);
    mb.appendChild(row1);

    const row2=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginTop:'14px'}});
    const freqG=selFld('Frequência de renovação','renewal_frequency',[['monthly','Mensal'],['quarterly','Trimestral'],['semi-annual','Semestral'],['annual','Anual'],['custom','Outra / Trienal']]);
    freqG.style.marginTop='0';freqSelect=freqG.querySelector('select');row2.appendChild(freqG);
    const{g:remG,el:remEl}=fld('Lembrar (dias antes)','remind_days_before','number','30');remindInp=remEl;remG.style.marginTop='0';row2.appendChild(remG);
    mb.appendChild(row2);

    const gNotes=h('div',{className:'form-group',style:{marginTop:'14px'}});
    gNotes.appendChild(h('label',{className:'form-label'},'Observações'));
    const taNotes=document.createElement('textarea');taNotes.className='form-inp';taNotes.rows=2;taNotes.value=md.notes||'';taNotes.addEventListener('input',e=>{md.notes=e.target.value;});
    gNotes.appendChild(taNotes);mb.appendChild(gNotes);
    if(md.file_url)mb.appendChild(h('div',{style:{fontSize:12,color:'#1565C0',marginTop:8}},h('a',{href:md.file_url,target:'_blank',style:{color:'#1565C0'}},'📎 Ver documento anexado')));

    m.appendChild(mb);
    m.appendChild(h('div',{className:'modal-footer'},
      h('button',{className:'btn btn-gray',onClick:()=>ss({modal:null,modalData:{}})},'Cancelar'),
      h('button',{className:'btn btn-primary',disabled:saving,onClick:async()=>{
        if(!md.name||!md.expiry_date){ss({error:'Nome e data são obrigatórios.'});return;}
        ss({saving:true});
        let fileUrl=md.file_url||null;
        if(selectedFile){
          try{
            const safeName=selectedFile.name.replace(/[^a-zA-Z0-9._-]/g,'_');
            const path='documents/'+Date.now()+'_'+safeName;
            const{error:upErr}=await sb.storage.from('photos').upload(path,selectedFile,{upsert:true,contentType:selectedFile.type});
            if(upErr){alert('Erro no upload: '+upErr.message);ss({saving:false});return;}
            const{data:{publicUrl}}=sb.storage.from('photos').getPublicUrl(path);fileUrl=publicUrl;
          }catch(upEx){alert('Erro: '+upEx.message);ss({saving:false});return;}
        }
        const data={name:md.name,unit_id:md.unit_id||null,expiry_date:md.expiry_date,renewal_frequency:md.renewal_frequency||'annual',remind_days_before:Number(md.remind_days_before)||30,notes:md.notes||null,file_url:fileUrl,status:'active',company_id:COMPANY_ID};
        if(isEdit){await sb.from('documents').update(data).eq('id',md.id);}else{await sb.from('documents').insert(data);}
        await reload();ss({saving:false,modal:null,modalData:{},success:isEdit?'Documento atualizado!':'Documento cadastrado!'});
        setTimeout(()=>ss({success:null}),3000);
      }},saving?'Salvando...':'💾  Salvar')
    ));
    overlay.appendChild(m);frag.appendChild(overlay);
  }
  return frag;
}

  formCard.appendChild(r2(fld('Nome do Responsável','responsavel','text','Nome completo'),fld('E-mail','email','email','email@empresa.com')));
  formCard.appendChild(div({textAlign:'right'},
    h('button',{className:'btn btn-primary',style:{padding:'10px 28px'},disabled:saving,onClick:async()=>{
      ss({saving:true,error:null});
      try{
        await sb.from('companies').update({razao_social:company.razao_social||null,nome_fantasia:company.nome_fantasia||null,cnpj:company.cnpj||null,inscricao_estadual:company.inscricao_estadual||null,inscricao_municipal:company.inscricao_municipal||null,endereco:company.endereco||null,telefone:company.telefone||null,celular:company.celular||null,responsavel:company.responsavel||null,email:company.email||null}).eq('id',COMPANY_ID);
        ss({saving:false,success:'Dados salvos!'});setTimeout(()=>ss({success:null}),3000);
      }catch(e){ss({saving:false,error:'Erro ao salvar.'});}
    }},saving?'Salvando...':'💾  Salvar Dados')
  ));
  frag.appendChild(formCard);
  frag.appendChild(div({height:'20px'}));

  frag.appendChild(sec('🔒  Alterar Senha de Acesso'));
  const passCard=div({background:'#fff',border:'1px solid #D0D0D0',borderTop:'none',padding:'20px'});
  let passData={current:'',novo:'',confirma:''};
  function pFld(label,key,ph){
    const g=div({marginBottom:'14px'});g.appendChild(h('label',{className:'form-label'},label));
    const el=document.createElement('input');el.type='password';el.className='form-inp';el.placeholder=ph;
    el.addEventListener('input',e=>{passData[key]=e.target.value;});g.appendChild(el);return g;
  }
  passCard.appendChild(div({fontSize:12,color:'#777',marginBottom:14},'Confirme a senha atual para definir uma nova.'));
  const pr3=div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'14px'});
  pr3.appendChild(pFld('Senha Atual','current','Senha atual'));
  pr3.appendChild(pFld('Nova Senha','novo','Mínimo 6 caracteres'));
  pr3.appendChild(pFld('Confirmar','confirma','Repita a nova senha'));
  passCard.appendChild(pr3);
  const passErr=div({fontSize:12,color:'#C62828',fontWeight:700,marginBottom:10,display:'none'});
  passCard.appendChild(passErr);
  passCard.appendChild(div({textAlign:'right',marginTop:14},
    h('button',{className:'btn btn-primary',style:{padding:'10px 28px'},onClick:async()=>{
      passErr.style.display='none';
      if(!passData.current){passErr.textContent='Digite a senha atual.';passErr.style.display='block';return;}
      if(passData.novo.length<6){passErr.textContent='Nova senha: mínimo 6 caracteres.';passErr.style.display='block';return;}
      if(passData.novo!==passData.confirma){passErr.textContent='Senhas não coincidem.';passErr.style.display='block';return;}
      ss({saving:true,error:null});
      try{
        const currentHash=await hashPassword(passData.current);
        const{data:op}=await sb.from('operators').select('password_hash').eq('email',state.manager.email).single();
        if(op?.password_hash&&op.password_hash!==currentHash){ss({saving:false});passErr.textContent='Senha atual incorreta.';passErr.style.display='block';return;}

        await sb.from('operators').update({password_hash:newHash}).eq('email',state.manager.email);

      }catch(e){ss({saving:false,error:'Erro ao alterar senha.'});}
    }},'🔒  Alterar Senha')
  ));
  frag.appendChild(passCard);
  return frag;
}

  else if(tab==='documents'){try{content.appendChild(renderDocuments());}catch(e){content.appendChild(h('div',{style:{padding:'20px',color:'#C62828'}},e.message));}}

function confirmAction(msg,onYes){
  const overlay=document.createElement('div');
  Object.assign(overlay.style,{position:'fixed',inset:'0',background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:'999',fontFamily:"'Roboto',sans-serif"});
  const box=document.createElement('div');
  Object.assign(box.style,{background:'#fff',padding:'24px',maxWidth:'380px',width:'90%',boxShadow:'0 8px 32px rgba(0,0,0,.2)'});
  const msgEl=document.createElement('p');
  msgEl.textContent=msg;Object.assign(msgEl.style,{fontSize:'14px',color:'#1A1A1A',marginBottom:'20px',lineHeight:'1.5'});
  const btns=document.createElement('div');
  Object.assign(btns.style,{display:'flex',gap:'8px',justifyContent:'flex-end'});
  const cancelBtn=document.createElement('button');
  cancelBtn.textContent='Cancelar';Object.assign(cancelBtn.style,{padding:'8px 18px',background:'#9E9E9E',color:'#fff',border:'none',cursor:'pointer',fontWeight:'700',fontFamily:"'Roboto',sans-serif"});
  cancelBtn.onclick=()=>document.body.removeChild(overlay);
  const okBtn=document.createElement('button');
  okBtn.textContent='Confirmar';Object.assign(okBtn.style,{padding:'8px 18px',background:'#C62828',color:'#fff',border:'none',cursor:'pointer',fontWeight:'700',fontFamily:"'Roboto',sans-serif"});
  okBtn.onclick=()=>{document.body.removeChild(overlay);onYes();};
  btns.appendChild(cancelBtn);btns.appendChild(okBtn);
  box.appendChild(msgEl);box.appendChild(btns);overlay.appendChild(box);
  document.body.appendChild(overlay);
}

      // Loading screen padrão
      c=div({display:'flex',flexDirection:'column',minHeight:'100vh'},
        h('div',{className:'top-bar'},h('span',{style:{color:'#fff',fontWeight:900,fontSize:16}},'ConfereOps')),
        div({flex:1,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16},
          h('div',{className:'spinner'}),
          div({fontSize:13,color:'#888',fontWeight:700,letterSpacing:'.06em'},'CARREGANDO...')
        )
      );
    }
  }catch(err){
    console.error('Render error:',err);
    // Use plain innerHTML to avoid any dependency on h() or div()
    root.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:12px;padding:20px;font-family:Roboto,sans-serif"><div style="font-size:32px">⚠️</div><div style="font-size:14px;font-weight:700;color:#C62828">Erro ao carregar</div><div style="font-size:12px;color:#555;background:#f5f5f5;padding:8px 12px;max-width:500px;word-break:break-all;font-family:monospace">'+(err?.message||String(err))+'</div><button onclick="location.reload()" style="margin-top:8px;padding:10px 24px;background:#1A237E;color:#fff;border:none;cursor:pointer;font-family:Roboto,sans-serif;font-weight:700">Recarregar</button></div>';
    return;
  }
  if(c)root.appendChild(c);
}

render();init();
</script>
</body>
</html>
